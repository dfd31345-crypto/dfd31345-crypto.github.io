<!-- FORCE UPDATE 2026-03-06: Case preview image path fix -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CS2 Case Spin — shipzibi.com</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <h1 class="logo">CS2 Case Spin</h1>
        <p class="tagline">Spin rare Counter-Strike 2 cases</p>
      </div>
      <div class="nav-auth-btns">
        <button id="navLoginBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1.5rem; font-size: 1rem;">Log In</button>
        <button id="navSignupBtn" class="btn-primary" style="background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 0.6rem 1.5rem; font-size: 1rem;">Create Account</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2>Spin the Best CS2 Cases</h2>
      <p>Log in to start spinning rare Counter-Strike 2 cases.</p>
      <span id="heroLoginState"></span>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="search-section">
    <div class="container">
      <input type="text" id="searchBox" class="search-box" placeholder="Search cases...">
    </div>
  </section>

  <!-- Case Gallery -->
  <section class="cases-section">
    <div class="container">
      <h3>Available Cases</h3>
      <div class="cases-grid" id="casesGrid">
        <!-- Cases are inserted here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Modal for Case Details -->
  <div id="caseModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalCaseTitle"></h2>
      <div id="modalRarities" class="rarities-container">
        <!-- Rarities and weapons inserted here -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 CS2 Case Spin. All rights reserved.</p>
  </footer>

  <!-- Login/Create Account Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="close-auth">&times;</span>
      <div id="authForms">
        <form id="loginForm" style="display: block;">
          <h2>Login</h2>
          <input type="text" id="loginUser" placeholder="Username or Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="loginPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <div class="g-recaptcha" data-sitekey="6LdSeYEsAAAAAEJdUvPIGg2WtzPWXe_7xBVEZrN0"></div>
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Login</button>
          <button type="button" id="showSignup" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Create Account</button>
        </form>
        <form id="signupForm" style="display: none;">
          <h2>Create Account</h2>
          <input type="text" id="signupUser" placeholder="Username" required style="width:100%;margin-bottom:1rem;">
          <input type="email" id="signupEmail" placeholder="Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="signupPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="signupPass2" placeholder="Verify Password" required style="width:100%;margin-bottom:1rem;">
          <div class="g-recaptcha" data-sitekey="6LdSeYEsAAAAAEJdUvPIGg2WtzPWXe_7xBVEZrN0"></div>
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Sign Up</button>
          <button type="button" id="showLogin" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Back to Login</button>
        </form>
        <form id="otpForm" style="display: none;">
          <h2>Enter OTP</h2>
          <input type="text" id="otpCode" placeholder="6-digit code" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Verify</button>
        </form>
      </div>
      <div id="authMsg" style="color:#ff6b35;text-align:center;margin-top:1rem;"></div>
    </div>
  </div>

  <script>
    const casesGrid = document.getElementById("casesGrid");
    // Navbar auth buttons
    const navLoginBtn = document.getElementById("navLoginBtn");
    const navSignupBtn = document.getElementById("navSignupBtn");
    // Dynamically render hero login button or welcome message
    function renderHeroLogin() {
      const heroLoginState = document.getElementById("heroLoginState");
      const user = getUser();
      if (user) {
        heroLoginState.innerHTML = `Welcome <b>${user.username}</b>! <button id='viewAccountBtn' class='btn-primary' style='margin-left:1rem;'>View Account</button>`;
        document.getElementById('viewAccountBtn').onclick = function() {
          alert('Account page coming soon!');
        };
      } else {
        heroLoginState.innerHTML = `<button class='btn-primary' id='heroLoginBtn'>Login</button>`;
        document.getElementById('heroLoginBtn').onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "block";
          signupForm.style.display = "none";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
      }
    }
    // Call on page load and after login/logout
    renderHeroLogin();
    const origSetUser = setUser;
    setUser = function(token, username) { origSetUser(token, username); updateNavbarAuth(); renderHeroLogin(); };
    const origClearUser = clearUser;
    clearUser = function() { origClearUser(); updateNavbarAuth(); renderHeroLogin(); };
    // Helper: Check login state
    function getUser() {
      const token = localStorage.getItem("token");
      const username = localStorage.getItem("username");
      return token && username ? { token, username } : null;
    }
    function setUser(token, username) {
      localStorage.setItem("token", token);
      localStorage.setItem("username", username);
    }
    function clearUser() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
    }
    // Update navbar for login state
    function updateNavbarAuth() {
      const navAuthBtns = document.querySelector(".nav-auth-btns");
      const user = getUser();
      if (user) {
        navAuthBtns.innerHTML = `<span style="margin-right:1rem;">Logged in as <b>${user.username}</b></span><button id="navSignOutBtn" class="btn-primary" style="background:#ff6b35;color:#fff;">Sign Out</button>`;
        document.getElementById("navSignOutBtn").onclick = () => {
          clearUser();
          updateNavbarAuth();
        };
      } else {
        navAuthBtns.innerHTML = `<button id="navLoginBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1.5rem; font-size: 1rem;">Log In</button><button id="navSignupBtn" class="btn-primary" style="background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 0.6rem 1.5rem; font-size: 1rem;">Create Account</button>`;
        document.getElementById("navLoginBtn").onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "block";
          signupForm.style.display = "none";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
        document.getElementById("navSignupBtn").onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "none";
          signupForm.style.display = "block";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
      }
    }
    // Always re-attach modal event listeners after DOM changes
    function attachAuthModalListeners() {
      const navLoginBtn = document.getElementById("navLoginBtn");
      const navSignupBtn = document.getElementById("navSignupBtn");
      if (navLoginBtn) navLoginBtn.onclick = () => {
        authModal.style.display = "block";
        loginForm.style.display = "block";
        signupForm.style.display = "none";
        otpForm.style.display = "none";
        authMsg.textContent = "";
      };
      if (navSignupBtn) navSignupBtn.onclick = () => {
        authModal.style.display = "block";
        loginForm.style.display = "none";
        signupForm.style.display = "block";
        otpForm.style.display = "none";
        authMsg.textContent = "";
      };
      const showSignup = document.getElementById("showSignup");
      if (showSignup) showSignup.onclick = () => {
        loginForm.style.display = "none";
        signupForm.style.display = "block";
        otpForm.style.display = "none";
        authMsg.textContent = "";
      };
      const showLogin = document.getElementById("showLogin");
      if (showLogin) showLogin.onclick = () => {
        loginForm.style.display = "block";
        signupForm.style.display = "none";
        otpForm.style.display = "none";
        authMsg.textContent = "";
      };
      const closeAuthBtn = document.querySelector(".close-auth");
      if (closeAuthBtn) closeAuthBtn.onclick = () => {
        authModal.style.display = "none";
      };
    }
    // Call after any navbar or modal DOM update
    function updateNavbarAuthAndListeners() {
      updateNavbarAuth();
      attachAuthModalListeners();
    }
    // Patch setUser/clearUser to always update listeners
    setUser = function(token, username) { origSetUser(token, username); updateNavbarAuthAndListeners(); renderHeroLogin(); };
    clearUser = function() { origClearUser(); updateNavbarAuthAndListeners(); renderHeroLogin(); };
    // On page load
    attachAuthModalListeners();
    // --- Ensure case gallery always renders ---
    // (loadCases is already called on page load)

    // --- SIGNUP/LOGIN/OTP LOGIC (EMAIL ONLY) ---
    // Helper: Show message
    function showAuthMsg(msg, color = '#ff6b35') {
      authMsg.textContent = msg;
      authMsg.style.color = color;
    }

    // Signup form submit
    signupForm.onsubmit = async function(e) {
      e.preventDefault();
      showAuthMsg('Creating account...','');
      const username = signupUser.value.trim();
      const email = signupEmail.value.trim();
      const password = signupPass.value;
      const password2 = document.getElementById('signupPass2').value;
      const recaptcha = signupForm.querySelector('.g-recaptcha-response').value;
      if (!username || !email || !password || !password2 || !recaptcha) return showAuthMsg('All fields required');
      if (password !== password2) return showAuthMsg('Passwords do not match');
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, recaptcha })
        });
        const data = await res.json();
        if (!data.success) {
          let debugMsg = data.error ? `Signup failed: ${data.error}` : 'Signup failed';
          // Show all returned data for debugging
          debugMsg += '\n' + JSON.stringify(data, null, 2);
          return showAuthMsg(debugMsg);
        }
        setUser(data.token, data.username);
        showAuthMsg('Account created! Redirecting...','green');
        setTimeout(() => {
          authModal.style.display = 'none';
          window.location.reload();
        }, 2000);
      } catch {
        showAuthMsg('Signup failed');
      }
    };

    // Login form submit
    loginForm.onsubmit = async function(e) {
      e.preventDefault();
      showAuthMsg('Logging in...','');
      const username = loginUser.value.trim();
      const email = loginUser.value.includes('@') ? loginUser.value.trim() : '';
      const password = loginPass.value;
      const recaptcha = loginForm.querySelector('.g-recaptcha-response').value;
      if ((!username && !email) || !password || !recaptcha) return showAuthMsg('All fields required');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, recaptcha })
        });
        const data = await res.json();
        if (!data.success) return showAuthMsg(data.error || 'Login failed');
          setUser(data.token, data.username);
          showAuthMsg('Login successful! Redirecting...','green');
          setTimeout(() => {
            authModal.style.display = 'none';
            window.location.reload();
          }, 2000);
      } catch {
        showAuthMsg('Login failed');
      }
    };
    // OTP form submit
    otpForm.onsubmit = async function(e) {
      e.preventDefault();
      showAuthMsg('Verifying code...','');
      const userId = otpForm.dataset.userId;
      const otp = otpCode.value.trim();
      if (!otp) return showAuthMsg('Enter the code sent to your email');
      try {
        const res = await fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, otp })
        });
        const data = await res.json();
        if (!data.success) return showAuthMsg(data.error || 'Invalid or expired code');
        // Success: log in and redirect
        setUser(data.token, loginUser.value || signupUser.value);
        showAuthMsg('Account verified! Redirecting...','green');
        setTimeout(() => {
          authModal.style.display = 'none';
          window.location.reload();
        }, 2000);
      } catch {
        showAuthMsg('Verification failed');
      }
    };

    // --- CASE GALLERY RENDERING ---
    async function loadCases() {
      try {
        const res = await fetch('cases-config.json');
        if (!res.ok) throw new Error('cases-config.json not found');
        const data = await res.json();
        const cases = data.cases || [];
        renderCases(cases);
        // Search functionality
        const searchBox = document.getElementById('searchBox');
        searchBox.oninput = function() {
          const q = searchBox.value.toLowerCase();
          renderCases(cases.filter(c => c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)));
        };
      } catch (e) {
        casesGrid.innerHTML = `<div style='color:#ff6b35;text-align:center;width:100%;font-size:1.2rem;'>Error: ${e.message}</div>`;
      }
    }

    function renderCases(cases) {
      if (!cases.length) {
        casesGrid.innerHTML = `<div style='color:#ff6b35;text-align:center;width:100%;font-size:1.2rem;'>No cases found.</div>`;
        return;
      }
        casesGrid.innerHTML = cases.map(cs => `
          <div class="case-card" data-case-id="${cs.id.replace(/"/g, '&quot;')}">
            <div class="case-placeholder">
              ${cs.preview ? `<img src="${cs.preview}" alt="${cs.name} Preview" style="width:100%;height:100%;object-fit:cover;">` : `<span>?</span>`}
            </div>
            <div class="case-info">
              <h4>${cs.name}</h4>
              <div class="weapon-count">${cs.rarities && cs.rarities.length ? cs.rarities.reduce((a, r) => a + (r.weapons ? r.weapons.length : 0), 0) : 0} Weapons</div>
              <button class="btn-spin" data-case-id="${cs.id.replace(/"/g, '&quot;')}">View Case</button>
            </div>
          </div>
        `).join('');
      // Attach click listeners for modal
      document.querySelectorAll('.btn-spin').forEach(btn => {
        btn.onclick = function(e) {
          const caseId = btn.getAttribute('data-case-id');
          const cs = cases.find(c => c.id === caseId);
          if (cs) showCaseModal(cs);
        };
      });
    }

    // Modal logic for case details
    const caseModal = document.getElementById('caseModal');
    const modalCaseTitle = document.getElementById('modalCaseTitle');
    const modalRarities = document.getElementById('modalRarities');
    document.querySelector('#caseModal .close').onclick = function() {
      caseModal.style.display = 'none';
    };
    function showCaseModal(cs) {
      modalCaseTitle.textContent = cs.name;
        if (!cs.rarities || !cs.rarities.length) {
          modalRarities.innerHTML = '<div style="color:#ff6b35;text-align:center;">No weapon data for this case.</div>';
        } else {
          // Helper to get rarity color class and color value
          function getRarityClass(rarityName) {
            const name = rarityName.toLowerCase();
            if (name.includes('light blue')) return 'rarity-light-blue';
            if (name.includes('dark blue')) return 'rarity-dark-blue';
            if (name.includes('purple')) return 'rarity-purple';
            if (name.includes('pink')) return 'rarity-pink';
            if (name.includes('red')) return 'rarity-red';
            if (name.includes('gold')) return 'rarity-gold';
            if (name.includes('gray')) return 'rarity-gray';
            return '';
          }
          function getRarityColor(rarityName) {
            const name = rarityName.toLowerCase();
            if (name.includes('light blue')) return '#5edfff';
            if (name.includes('dark blue')) return '#3b5fff';
            if (name.includes('purple')) return '#b366ff';
            if (name.includes('pink')) return '#ff69b4';
            if (name.includes('red')) return '#ff3b3b';
            if (name.includes('gold')) return '#ffd700';
            if (name.includes('gray')) return '#b0b0b0';
            return '#fff';
          }
          modalRarities.innerHTML = cs.rarities.map(r => `
            <div class="rarity-section">
              <h3>${r.name}</h3>
              <div class="weapons-grid">
                ${r.weapons.map((w, idx) => `
                  <div class="weapon-card">
                    <div class="weapon-image" data-rarity="${r.name}">
                      ${w.image ? `<img src="cases/${cs.id}/${r.name}/${w.image}" alt="${w.image}" data-rarity="${r.name}" style="max-width:100%;max-height:100%;object-fit:contain;">` : '?'}
                      <div class="rarity-overlay-line ${getRarityClass(r.name)}"></div>
                    </div>
                    <div>${w.image.replace(/\.png$/i, '').replace(/-/g, ' ')}</div>
                    <div class="chance">${w.chance ? w.chance + '%' : ''}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('');
          // After rendering, ensure all weapon images fit and have colored box-shadow
          setTimeout(() => {
            document.querySelectorAll('#modalRarities .weapon-image img').forEach(img => {
              img.onload = function() {
                // Always fit image in frame
                img.style.width = 'auto';
                img.style.height = '100%';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';
                img.style.objectFit = 'contain';
                // Add colored box-shadow for rarity
                const rarity = img.getAttribute('data-rarity');
                img.parentElement.style.boxShadow = `0 0 0 3px ${getRarityColor(rarity)}`;
              };
              // If already loaded (cache), trigger manually
              if (img.complete) img.onload();
            });
          }, 0);
      }
      caseModal.style.display = 'block';
    }

    // Load cases on page load
    loadCases();
  </script>
</body>
</html>
