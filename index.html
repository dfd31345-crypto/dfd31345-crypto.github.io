<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CS2 Case Spin — shipzibi.com</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <h1 class="logo">CS2 Case Spin</h1>
        <p class="tagline">Spin rare Counter-Strike 2 cases</p>
      </div>
      <div class="nav-auth-btns">
        <button id="navLoginBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1.5rem; font-size: 1rem;">Log In</button>
        <button id="navSignupBtn" class="btn-primary" style="background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 0.6rem 1.5rem; font-size: 1rem;">Create Account</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2>Spin the Best CS2 Cases</h2>
      <p>Log in to start spinning rare Counter-Strike 2 cases.</p>
      <button class="btn-primary">Login</button>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="search-section">
    <div class="container">
      <input type="text" id="searchBox" class="search-box" placeholder="Search cases...">
    </div>
  </section>

  <!-- Case Gallery -->
  <section class="cases-section">
    <div class="container">
      <h3>Available Cases</h3>
      <div class="cases-grid" id="casesGrid">
        <!-- Cases are inserted here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Modal for Case Details -->
  <div id="caseModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalCaseTitle"></h2>
      <div id="modalRarities" class="rarities-container">
        <!-- Rarities and weapons inserted here -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 CS2 Case Spin. All rights reserved.</p>
  </footer>

  <!-- Login/Create Account Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="close-auth">&times;</span>
      <div id="authForms">
        <form id="loginForm" style="display: block;">
          <h2>Login</h2>
          <input type="text" id="loginUser" placeholder="Username or Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="loginPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Login</button>
          <button type="button" id="showSignup" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Create Account</button>
        </form>
        <form id="signupForm" style="display: none;">
          <h2>Create Account</h2>
          <input type="text" id="signupUser" placeholder="Username" required style="width:100%;margin-bottom:1rem;">
          <input type="email" id="signupEmail" placeholder="Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="signupPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <input type="tel" id="signupPhone" placeholder="Phone (for 2FA)" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Sign Up</button>
          <button type="button" id="showLogin" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Back to Login</button>
        </form>
        <form id="otpForm" style="display: none;">
          <h2>Enter OTP</h2>
          <input type="text" id="otpCode" placeholder="6-digit code" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Verify</button>
        </form>
      </div>
      <div id="authMsg" style="color:#ff6b35;text-align:center;margin-top:1rem;"></div>
    </div>
  </div>

  <script>
    const casesGrid = document.getElementById("casesGrid");
    // Navbar auth buttons
    const navLoginBtn = document.getElementById("navLoginBtn");
    const navSignupBtn = document.getElementById("navSignupBtn");
    const searchBox = document.getElementById("searchBox");
    const modal = document.getElementById("caseModal");
    const closeBtn = document.querySelector(".close");
    let casesData = [];

    // Load cases configuration
    async function loadCases() {
      try {
        const response = await fetch("cases-config.json");
        if (!response.ok) throw new Error("cases-config.json not found");
        const data = await response.json();
        casesData = data.cases || [];
        renderCases(casesData);
      } catch (error) {
        console.error("Error loading cases:", error);
        casesGrid.innerHTML = `<p style="color: #ff6b35; grid-column: 1/-1;">Error: Run <code>python3 build-cases.py</code> in the site folder first.</p>`;
      }
    }

    function renderCases(casesToShow) {
      casesGrid.innerHTML = "";
      casesToShow.forEach((cs, idx) => {
        const card = document.createElement("div");
        card.className = "case-card";
        const totalWeapons = cs.rarities.reduce((sum, r) => sum + r.weapons.length, 0);
        const previewImage = cs.preview || `cases/${cs.id}.png`;
        card.innerHTML = `
          <div class="case-placeholder">
            <img src="${previewImage}" alt="${cs.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 0;">
          </div>
          <div class="case-info">
            <h4>${cs.name}</h4>
            <p class="weapon-count">${totalWeapons} Weapons Available</p>
            <button class="btn-spin">View Weapons</button>
          </div>
        `;
        card.addEventListener("click", () => openModal(cs));
        casesGrid.appendChild(card);
      });
    }

    function openModal(caseData) {
      document.getElementById("modalCaseTitle").textContent = caseData.name;
      const rarityContainer = document.getElementById("modalRarities");
      rarityContainer.innerHTML = "";
      caseData.rarities.forEach(rarity => {
        const rarityDiv = document.createElement("div");
        rarityDiv.className = "rarity-section";
        rarityDiv.innerHTML = `<h3>${rarity.name}</h3>`;
        const weaponsGrid = document.createElement("div");
        weaponsGrid.className = "weapons-grid";
        rarity.weapons.forEach(weapon => {
          const weaponCard = document.createElement("div");
          weaponCard.className = "weapon-card";
          let imgPath = `cases/${caseData.id}/${rarity.name}/${weapon.image}`;
          weaponCard.innerHTML = `
            <img src="${imgPath}" alt="${weapon.image}" class="weapon-image" style="width:120px;height:120px;object-fit:contain;display:block;margin:0 auto 0.5rem auto;">
            <p class="chance">${weapon.chance ? weapon.chance + '%' : ''}</p>
          `;
          weaponsGrid.appendChild(weaponCard);
        });
        rarityDiv.appendChild(weaponsGrid);
        rarityContainer.appendChild(rarityDiv);
      });
      modal.style.display = "block";
    }


    closeBtn.addEventListener("click", () => {
      modal.style.display = "none";
    });

    window.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });

    searchBox.addEventListener("input", (e) => {
      const filtered = casesData.filter(cs =>
        cs.name.toLowerCase().includes(e.target.value.toLowerCase())
      );
      renderCases(filtered);
    });

    // --- Auth Modal Logic ---
    const authModal = document.getElementById("authModal");
    // Remove old hero login button logic
    // const btnPrimary = document.querySelector(".btn-primary");
    const closeAuthBtn = document.querySelector(".close-auth");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const otpForm = document.getElementById("otpForm");
    const showSignup = document.getElementById("showSignup");
    const showLogin = document.getElementById("showLogin");
    const authMsg = document.getElementById("authMsg");

    navLoginBtn.addEventListener("click", () => {
      authModal.style.display = "block";
      loginForm.style.display = "block";
      signupForm.style.display = "none";
      otpForm.style.display = "none";
      authMsg.textContent = "";
    });
    navSignupBtn.addEventListener("click", () => {
      authModal.style.display = "block";
      loginForm.style.display = "none";
      signupForm.style.display = "block";
      otpForm.style.display = "none";
      authMsg.textContent = "";
    });
    closeAuthBtn.addEventListener("click", () => {
      authModal.style.display = "none";
    });
    window.addEventListener("click", (e) => {
      if (e.target === authModal) authModal.style.display = "none";
    });
    showSignup.addEventListener("click", () => {
      loginForm.style.display = "none";
      signupForm.style.display = "block";
      otpForm.style.display = "none";
      authMsg.textContent = "";
    });
    showLogin.addEventListener("click", () => {
      loginForm.style.display = "block";
      signupForm.style.display = "none";
      otpForm.style.display = "none";
      authMsg.textContent = "";
    });
    // --- API Integration ---
    const API_URL = "http://localhost:3001/api";

    loginForm.addEventListener("submit", async function(e) {
      e.preventDefault();
      authMsg.textContent = "";
      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, email: user, password: pass })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Login failed");
        loginForm.style.display = "none";
        signupForm.style.display = "none";
        otpForm.style.display = "block";
        otpForm.dataset.userId = data.userId;
        authMsg.textContent = "A verification code has been sent to your phone/email.";
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });

    signupForm.addEventListener("submit", async function(e) {
      e.preventDefault();
      authMsg.textContent = "";
      const username = document.getElementById("signupUser").value;
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPass").value;
      const phone = document.getElementById("signupPhone").value;
      try {
        const res = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password, phone })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Signup failed");
        loginForm.style.display = "none";
        signupForm.style.display = "none";
        otpForm.style.display = "block";
        otpForm.dataset.userId = data.userId;
        authMsg.textContent = "A verification code has been sent to your phone/email.";
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });

    otpForm.addEventListener("submit", async function(e) {
      e.preventDefault();
      authMsg.textContent = "";
      const otp = document.getElementById("otpCode").value;
      const userId = otpForm.dataset.userId;
      try {
        const res = await fetch(`${API_URL}/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, otp })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "OTP verification failed");
        authMsg.textContent = "Verification successful!";
        setTimeout(() => { authModal.style.display = "none"; }, 1200);
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });

    // Load cases on page load
    loadCases();
  </script>
</body>
</html>
