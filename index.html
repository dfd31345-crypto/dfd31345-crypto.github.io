<!-- FORCE UPDATE 2026-03-06: Case preview image path fix -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CS2 Case Spin — shipzibi.com</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app-config.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <h1 class="logo">CS2 Case Spin</h1>
        <p class="tagline">Spin rare Counter-Strike 2 cases</p>
      </div>
      <div class="nav-auth-btns">
        <button id="navSteamLoginBtn" class="btn-primary" style="padding: 0.6rem 1.5rem; font-size: 1rem;">Sign In With Steam</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2>Spin the Best CS2 Cases</h2>
      <p>Sign in with Steam to start spinning rare Counter-Strike 2 cases.</p>
      <span id="heroLoginState"></span>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="search-section">
    <div class="container">
      <input type="text" id="searchBox" class="search-box" placeholder="Search cases...">
    </div>
  </section>

  <!-- Case Gallery -->
  <section class="cases-section">
    <div class="container">
      <h3>Available Cases</h3>
      <div class="cases-grid" id="casesGrid">
        <!-- Cases are inserted here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Modal for Case Details -->
  <div id="caseModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalCaseTitle"></h2>
      <div id="modalRarities" class="rarities-container">
        <!-- Rarities and weapons inserted here -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 CS2 Case Spin. All rights reserved.</p>
  </footer>

  <script>
    const casesGrid = document.getElementById("casesGrid");
    const heroLoginState = document.getElementById("heroLoginState");
    const navAuthBtns = document.querySelector(".nav-auth-btns");
    const rawApiBase = (window.APP_CONFIG && window.APP_CONFIG.API_BASE_URL) ? String(window.APP_CONFIG.API_BASE_URL) : '';
    const API_BASE_URL = rawApiBase.replace(/\/$/, '');

    function apiUrl(path) {
      return `${API_BASE_URL}${path}`;
    }

    function startSteamLogin() {
      const redirect = encodeURIComponent(window.location.origin);
      window.location.href = apiUrl(`/api/auth/steam?redirect=${redirect}`);
    }

    async function getCurrentUser() {
      try {
        const res = await fetch(apiUrl('/api/auth/me'), { credentials: 'include' });
        if (!res.ok) return null;
        const data = await res.json();
        return data && data.authenticated ? data.user : null;
      } catch {
        return null;
      }
    }

    async function signOut() {
      await fetch(apiUrl('/api/auth/logout'), { method: 'POST', credentials: 'include' });
      await renderAuthState();
    }

    function renderLoggedOutState() {
      navAuthBtns.innerHTML = `<button id="navSteamLoginBtn" class="btn-primary" style="padding: 0.6rem 1.5rem; font-size: 1rem;">Sign In With Steam</button>`;
      const navSteamLoginBtn = document.getElementById('navSteamLoginBtn');
      if (navSteamLoginBtn) navSteamLoginBtn.onclick = startSteamLogin;

      heroLoginState.innerHTML = `<button class='btn-primary' id='heroSteamLoginBtn'>Sign In With Steam</button>`;
      const heroSteamLoginBtn = document.getElementById('heroSteamLoginBtn');
      if (heroSteamLoginBtn) heroSteamLoginBtn.onclick = startSteamLogin;
    }

    function renderLoggedInState(user) {
      const avatarHtml = user.avatar
        ? `<img src="${user.avatar}" alt="${user.displayName}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;margin-right:0.6rem;border:1px solid rgba(255,255,255,0.35);vertical-align:middle;">`
        : '';
      navAuthBtns.innerHTML = `<span style="margin-right:1rem;display:inline-flex;align-items:center;">${avatarHtml}Logged in as <b style="margin-left:0.25rem;">${user.displayName}</b></span><button id="navSignOutBtn" class="btn-primary" style="background:#ff6b35;color:#fff;">Sign Out</button>`;
      const navSignOutBtn = document.getElementById('navSignOutBtn');
      if (navSignOutBtn) navSignOutBtn.onclick = signOut;

      heroLoginState.innerHTML = `Welcome <b>${user.displayName}</b>! <a href="${user.profileUrl}" target="_blank" rel="noopener" class="btn-primary" style="margin-left:1rem;text-decoration:none;display:inline-block;">View Steam Profile</a>`;
    }

    async function renderAuthState() {
      const user = await getCurrentUser();
      if (!user) {
        renderLoggedOutState();
        return;
      }
      renderLoggedInState(user);
    }

    async function trackRevisit() {
      try {
        const params = new URLSearchParams(window.location.search);
        const ref = document.referrer.toLowerCase();
        const telegramSource =
          params.has('tgWebAppData') ||
          params.has('startapp') ||
          params.has('startattach') ||
          ref.includes('t.me') ||
          ref.includes('telegram');

        const source = telegramSource ? 'telegram' : 'web';
        await fetch(apiUrl(`/api/telemetry/revisit?source=${source}`), {
          method: 'POST',
          credentials: 'include'
        });
      } catch {
        // Do not block page load on telemetry failures.
      }
    }

    renderAuthState();
    trackRevisit();

    // --- CASE GALLERY RENDERING ---
    async function loadCases() {
      try {
        const res = await fetch('cases-config.json');
        if (!res.ok) throw new Error('cases-config.json not found');
        const data = await res.json();
        const cases = data.cases || [];
        renderCases(cases);
        // Search functionality
        const searchBox = document.getElementById('searchBox');
        searchBox.oninput = function() {
          const q = searchBox.value.toLowerCase();
          renderCases(cases.filter(c => c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)));
        };
      } catch (e) {
        casesGrid.innerHTML = `<div style='color:#ff6b35;text-align:center;width:100%;font-size:1.2rem;'>Error: ${e.message}</div>`;
      }
    }

    function renderCases(cases) {
      if (!cases.length) {
        casesGrid.innerHTML = `<div style='color:#ff6b35;text-align:center;width:100%;font-size:1.2rem;'>No cases found.</div>`;
        return;
      }
        casesGrid.innerHTML = cases.map(cs => `
          <div class="case-card" data-case-id="${cs.id.replace(/"/g, '&quot;')}">
            <div class="case-placeholder">
              ${cs.preview ? `<img src="${cs.preview}" alt="${cs.name} Preview" style="width:100%;height:100%;object-fit:cover;">` : `<span>?</span>`}
            </div>
            <div class="case-info">
              <h4>${cs.name}</h4>
              <div class="weapon-count">${cs.rarities && cs.rarities.length ? cs.rarities.reduce((a, r) => a + (r.weapons ? r.weapons.length : 0), 0) : 0} Weapons</div>
              <button class="btn-spin" data-case-id="${cs.id.replace(/"/g, '&quot;')}">View Case</button>
            </div>
          </div>
        `).join('');
      // Attach click listeners for modal
      document.querySelectorAll('.btn-spin').forEach(btn => {
        btn.onclick = function(e) {
          const caseId = btn.getAttribute('data-case-id');
          const cs = cases.find(c => c.id === caseId);
          if (cs) showCaseModal(cs);
        };
      });
    }

    // Modal logic for case details
    const caseModal = document.getElementById('caseModal');
    const modalCaseTitle = document.getElementById('modalCaseTitle');
    const modalRarities = document.getElementById('modalRarities');
    document.querySelector('#caseModal .close').onclick = function() {
      caseModal.style.display = 'none';
    };
    function showCaseModal(cs) {
      modalCaseTitle.textContent = cs.name;
        if (!cs.rarities || !cs.rarities.length) {
          modalRarities.innerHTML = '<div style="color:#ff6b35;text-align:center;">No weapon data for this case.</div>';
        } else {
          // Helper to get rarity color class and color value
          function getRarityClass(rarityName) {
            const name = rarityName.toLowerCase();
            if (name.includes('light blue')) return 'rarity-light-blue';
            if (name.includes('dark blue')) return 'rarity-dark-blue';
            if (name.includes('purple')) return 'rarity-purple';
            if (name.includes('pink')) return 'rarity-pink';
            if (name.includes('red')) return 'rarity-red';
            if (name.includes('gold')) return 'rarity-gold';
            if (name.includes('gray')) return 'rarity-gray';
            return '';
          }
          function getRarityColor(rarityName) {
            const name = rarityName.toLowerCase();
            if (name.includes('light blue')) return '#5edfff';
            if (name.includes('dark blue')) return '#3b5fff';
            if (name.includes('purple')) return '#b366ff';
            if (name.includes('pink')) return '#ff69b4';
            if (name.includes('red')) return '#ff3b3b';
            if (name.includes('gold')) return '#ffd700';
            if (name.includes('gray')) return '#b0b0b0';
            return '#fff';
          }
          modalRarities.innerHTML = cs.rarities.map(r => `
            <div class="rarity-section">
              <h3>${r.name}</h3>
              <div class="weapons-grid">
                ${r.weapons.map((w, idx) => `
                  <div class="weapon-card">
                    <div class="weapon-image" data-rarity="${r.name}">
                      ${w.image ? `<img src="cases/${cs.id}/${r.name}/${w.image}" alt="${w.image}" data-rarity="${r.name}" style="max-width:100%;max-height:100%;object-fit:contain;">` : '?'}
                      <div class="rarity-overlay-line ${getRarityClass(r.name)}"></div>
                    </div>
                    <div>${w.image.replace(/\.png$/i, '').replace(/-/g, ' ')}</div>
                    <div class="chance">${w.chance ? w.chance + '%' : ''}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('');
          // After rendering, ensure all weapon images fit and have colored box-shadow
          setTimeout(() => {
            document.querySelectorAll('#modalRarities .weapon-image img').forEach(img => {
              img.onload = function() {
                // Always fit image in frame
                img.style.width = 'auto';
                img.style.height = '100%';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';
                img.style.objectFit = 'contain';
                // Add colored box-shadow for rarity
                const rarity = img.getAttribute('data-rarity');
                img.parentElement.style.boxShadow = `0 0 0 3px ${getRarityColor(rarity)}`;
              };
              // If already loaded (cache), trigger manually
              if (img.complete) img.onload();
            });
          }, 0);
      }
      caseModal.style.display = 'block';
    }

    // Load cases on page load
    loadCases();
  </script>
</body>
</html>
