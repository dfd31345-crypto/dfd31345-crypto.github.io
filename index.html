<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CS2 Case Spin — shipzibi.com</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <h1 class="logo">CS2 Case Spin</h1>
        <p class="tagline">Spin rare Counter-Strike 2 cases</p>
      </div>
      <div class="nav-auth-btns">
        <button id="navLoginBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1.5rem; font-size: 1rem;">Log In</button>
        <button id="navSignupBtn" class="btn-primary" style="background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 0.6rem 1.5rem; font-size: 1rem;">Create Account</button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2>Spin the Best CS2 Cases</h2>
      <p>Log in to start spinning rare Counter-Strike 2 cases.</p>
      <button class="btn-primary" id="heroLoginBtn">Login</button>
    <span id="heroLoginState"></span>
    <button class="btn-primary" id="heroLoginBtn">Login</button>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="search-section">
    <div class="container">
      <input type="text" id="searchBox" class="search-box" placeholder="Search cases...">
    </div>
  </section>

  <!-- Case Gallery -->
  <section class="cases-section">
    <div class="container">
      <h3>Available Cases</h3>
      <div class="cases-grid" id="casesGrid">
        <!-- Cases are inserted here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Modal for Case Details -->
  <div id="caseModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalCaseTitle"></h2>
      <div id="modalRarities" class="rarities-container">
        <!-- Rarities and weapons inserted here -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 CS2 Case Spin. All rights reserved.</p>
  </footer>

  <!-- Login/Create Account Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <span class="close-auth">&times;</span>
      <div id="authForms">
        <form id="loginForm" style="display: block;">
          <h2>Login</h2>
          <input type="text" id="loginUser" placeholder="Username or Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="loginPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Login</button>
          <button type="button" id="showSignup" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Create Account</button>
        </form>
        <form id="signupForm" style="display: none;">
          <h2>Create Account</h2>
          <input type="text" id="signupUser" placeholder="Username" required style="width:100%;margin-bottom:1rem;">
          <input type="email" id="signupEmail" placeholder="Email" required style="width:100%;margin-bottom:1rem;">
          <input type="password" id="signupPass" placeholder="Password" required style="width:100%;margin-bottom:1rem;">
          <input type="tel" id="signupPhone" placeholder="Phone (for 2FA)" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Sign Up</button>
          <button type="button" id="showLogin" style="width:100%;background:#222;color:#00d4ff;border:none;padding:0.7rem 0;border-radius:6px;">Back to Login</button>
        </form>
        <form id="otpForm" style="display: none;">
          <h2>Enter OTP</h2>
          <input type="text" id="otpCode" placeholder="6-digit code" required style="width:100%;margin-bottom:1rem;">
          <button type="submit" class="btn-primary" style="width:100%;margin-bottom:1rem;">Verify</button>
        </form>
      </div>
      <div id="authMsg" style="color:#ff6b35;text-align:center;margin-top:1rem;"></div>
    </div>
  </div>

  <script>
    const casesGrid = document.getElementById("casesGrid");
    // Navbar auth buttons
    const navLoginBtn = document.getElementById("navLoginBtn");
    const navSignupBtn = document.getElementById("navSignupBtn");
    const heroLoginBtn = document.getElementById("heroLoginBtn");
    // Helper: Check login state
    function getUser() {
      const token = localStorage.getItem("token");
      const username = localStorage.getItem("username");
      return token && username ? { token, username } : null;
    }
    function setUser(token, username) {
      localStorage.setItem("token", token);
      localStorage.setItem("username", username);
    }
    function clearUser() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
    }
    // Update navbar for login state
    function updateNavbarAuth() {
      const navAuthBtns = document.querySelector(".nav-auth-btns");
      const user = getUser();
      if (user) {
        navAuthBtns.innerHTML = `<span style="margin-right:1rem;">Logged in as <b>${user.username}</b></span><button id="navSignOutBtn" class="btn-primary" style="background:#ff6b35;color:#fff;">Sign Out</button>`;
        document.getElementById("navSignOutBtn").onclick = () => {
          clearUser();
          updateNavbarAuth();
        };
      } else {
        navAuthBtns.innerHTML = `<button id="navLoginBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1.5rem; font-size: 1rem;">Log In</button><button id="navSignupBtn" class="btn-primary" style="background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 0.6rem 1.5rem; font-size: 1rem;">Create Account</button>`;
        document.getElementById("navLoginBtn").onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "block";
          signupForm.style.display = "none";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
        document.getElementById("navSignupBtn").onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "none";
          signupForm.style.display = "block";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
      }
    }
    // On page load
    updateNavbarAuth();
    // Hero login button and state
    function updateHeroLoginState() {
      const heroLoginState = document.getElementById("heroLoginState");
      const heroLoginBtn = document.getElementById("heroLoginBtn");
      const user = getUser();
      if (user) {
        heroLoginBtn.style.display = "none";
        heroLoginState.innerHTML = `Welcome <b>${user.username}</b>! <button id='viewAccountBtn' class='btn-primary' style='margin-left:1rem;'>View Account</button>`;
        document.getElementById('viewAccountBtn').onclick = function() {
          alert('Account page coming soon!');
        };
      } else {
        heroLoginBtn.style.display = "inline-block";
        heroLoginState.innerHTML = "";
        heroLoginBtn.onclick = () => {
          authModal.style.display = "block";
          loginForm.style.display = "block";
          signupForm.style.display = "none";
          otpForm.style.display = "none";
          authMsg.textContent = "";
        };
      }
    }
    updateHeroLoginState();
    // Also update hero state on login/logout
    const origSetUser = setUser;
    setUser = function(token, username) { origSetUser(token, username); updateHeroLoginState(); };
    const origClearUser = clearUser;
    clearUser = function() { origClearUser(); updateHeroLoginState(); };
    // Add simple captcha to login/signup
    function showCaptcha(form, callback) {
      const captchaNum1 = Math.floor(Math.random()*10+1);
      const captchaNum2 = Math.floor(Math.random()*10+1);
      let captchaDiv = form.querySelector('.captcha-div');
      if (!captchaDiv) {
        captchaDiv = document.createElement('div');
        captchaDiv.className = 'captcha-div';
        captchaDiv.style = 'margin-bottom:1rem;';
        form.insertBefore(captchaDiv, form.querySelector('button'));
      }
      captchaDiv.innerHTML = `<label>Solve: ${captchaNum1} + ${captchaNum2} = <input type='number' class='captcha-input' style='width:60px;'></label>`;
      form.onsubmit = function(e) {
        e.preventDefault();
        const val = captchaDiv.querySelector('.captcha-input').value;
        if (parseInt(val) !== captchaNum1 + captchaNum2) {
          authMsg.textContent = 'Captcha incorrect!';
          return;
        }
        callback();
      };
    }
    // Login form with captcha and OTP
    loginForm.addEventListener("submit", function(e) { e.preventDefault(); });
    showCaptcha(loginForm, async function() {
      authMsg.textContent = "";
      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, email: user, password: pass })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Login failed");
        loginForm.style.display = "none";
        signupForm.style.display = "none";
        otpForm.style.display = "block";
        otpForm.dataset.userId = data.userId;
        otpForm.dataset.username = user;
        authMsg.textContent = "A verification code has been sent to your phone/email.";
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });
    // Signup form with captcha and OTP
    signupForm.addEventListener("submit", function(e) { e.preventDefault(); });
    showCaptcha(signupForm, async function() {
      authMsg.textContent = "";
      const username = document.getElementById("signupUser").value;
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPass").value;
      const phone = document.getElementById("signupPhone").value;
      try {
        const res = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password, phone })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "Signup failed");
        loginForm.style.display = "none";
        signupForm.style.display = "none";
        otpForm.style.display = "block";
        otpForm.dataset.userId = data.userId;
        otpForm.dataset.username = username;
        authMsg.textContent = "A verification code has been sent to your phone/email.";
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });
    // OTP form for both login and signup
    otpForm.addEventListener("submit", async function(e) {
      e.preventDefault();
      authMsg.textContent = "";
      const otp = document.getElementById("otpCode").value;
      const userId = otpForm.dataset.userId;
      const username = otpForm.dataset.username;
      try {
        const res = await fetch(`${API_URL}/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, otp })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "OTP verification failed");
        setUser(data.token, username);
        updateNavbarAuth();
        authMsg.textContent = "Verification successful!";
        setTimeout(() => { authModal.style.display = "none"; location.reload(); }, 1200);
      } catch (err) {
        authMsg.textContent = err.message;
      }
    });

    // Load cases on page load
    loadCases();
  </script>
</body>
</html>
